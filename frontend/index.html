<!DOCTYPE html>
<head>
    <title>Beauty is in the AI of the Beholder</title>
    <script src="/js/drawing.js"></script>
    <script src="/js/billiards.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/style.css">
</head>

<body onload="onload_drawing(); onload_billiards();">
    <div align="center">
        <h1>Beauty is in the AI of the Beholder</h1>
    </div>
    <div id="login" align="center">
        <h3 class="full">Login</h3>
        <div class="flex">
            <div class="full"> Enter your name: </div> <input type="text" class="full" maxlength="24" name="FirstName" id="name" value="">
        </div>
    </div>
    <div id="lobby-selection" align="center" style="display: none;">
        <h3 class="full">Select a Lobby</h3>
        <ul id="lobby-list" style="list-style-type: none; padding: 0;"></ul>
        <button id="show-create-lobby-btn" style="margin-top: 10px;">Create Lobby</button>
        <div id="create-lobby-section" class="flex" style="display: none; margin-top: 10px; flex-direction: column; align-items: center;">
            <div style="display: flex; flex-direction: row; align-items: center; justify-content: center; margin-bottom: 5px;">
                <input type="text" id="new-lobby-name" placeholder="New Lobby Name" maxlength="24">
                <button id="create-lobby" style="margin-left: 10px;">Create & Join</button>
            </div>
            <textarea id="new-lobby-words" placeholder="Optional: Custom word list (comma-separated)" rows="3" style="width: 80%; max-width: 400px; margin-top: 5px;"></textarea>
        </div>
        <button id="refresh-lobbies" style="margin-top: 10px;">Refresh</button>

        <div id="global-chat-container" style="margin-top: 20px; width: 80%; max-width: 600px; text-align: left; border: 1px solid #ccc; padding: 10px;">
            <h3>Global Chat</h3>
            <div id="global-chat-messages" style="height: 150px; overflow-y: scroll; border: 1px solid #eee; margin-bottom: 10px; padding: 5px;"></div>
            <input type="text" id="global-chat-input" placeholder="Say something..." maxlength="256" style="width: 100%;">
        </div>
    </div>
    <div align="center" id="game" style="display: none;">
        <meter id="timer" min="0" max="120"></meter>
        <div id="gamecontainer">
            <div id="progress-container">
                <div id="player-container">
                    <h2>Players:</h2>
                    <ul class="user-list" id="user-list-1"></ul>
                </div>
                <div id="drawing-container">
                    <div id="word">
                        <br>
                    </div>
                    <div id="score">
                        <br>
                    </div>
                    <div id="drawing-workspace">
                        <div id="gallery">
                            <div id="drawing">
                                <canvas class="image" id="canvas" style="display: block;"></canvas>
                            </div>
                        </div>
                        <div id="controls">
                            <div id="colorpicker-container">
                                <p>Color:</p> <div id="colorpicker"></div>
                            </div>
                            <div id="stroke-container">
                                <p>Stroke:</p> <input type="range" id="size" value="5" min="1" max="50">
                            </div>
                            <div id="tool-buttons">
                                <button id="erase" title="Eraser">🧽</button>
                                <button id="pencil" title="Pencil">✏️</button>
                                <button id="flood" title="Flood Fill">🪣</button>
                                <button id="undo" title="Undo">↩️</button>
                                <button id="judge" title="Judge">👨‍⚖️</button>
                                <button id="select" title="Select">⬚</button>
                                <button id="text" title="Text">T</button>
                                <button id="shape" title="Shape">△</button>
                            </div>
                            <div id="selection-options" style="display: none;">
                                <button id="copy-btn">Copy</button>
                                <button id="delete-btn">Delete</button>
                                <button id="paste-btn" style="display: none;">Paste</button>
                            </div>
                            <div id="text-options" style="display: none;">
                                <input type="text" id="text-input" placeholder="Enter text">
                                <select id="font-select">
                                    <option value="Arial">Arial</option>
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Courier New">Courier New</option>
                                    <option value="Georgia">Georgia</option>
                                </select>
                                <input type="number" id="text-size" value="20" min="10" max="100">
                            </div>
                            <div id="shape-options" style="display: none;">
                                <select id="shape-select">
                                    <option value="rectangle">Rectangle</option>
                                    <option value="circle">Circle</option>
                                    <option value="triangle">Triangle</option>
                                    <option value="line">Line</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="lobby-container">
                <h2>Players:</h2>
                <ul class="user-list" id="user-list-2"></ul>
                <button id="start" style="display: none;">Start</button>
            </div>
            <div id="endgame-container">
                <h2>GG! EZ!</h2>
                <ul class="user-list" id="user-list-3"></ul>
                <button id="restart" style="display: none;">Restart</button>
            </div>
            <div id="answerscontainer">
                <div id="dummy"> <input type="text" name="FirstName" id="guess" value="" placeholder="Guess or chat:" maxlength="256"> </div>
                <div id="answers"> </div>
            </div>
            <div id="finalgallery"></div>
        </div>

    </div>

</body>
